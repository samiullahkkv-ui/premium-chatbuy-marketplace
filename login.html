<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Premium Carousel Split Portal</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            background-color: #0b0f19;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }
        .carousel-item {
            display: none;
            animation: fade 0.8s ease-in-out;
        }
        .carousel-item.active {
            display: block;
        }
        @keyframes fade {
            from { opacity: 0.4; } to { opacity: 1; }
        }
    </style>
</head>
<body class="min-h-screen flex flex-col md:flex-row h-screen overflow-hidden">

    <div class="w-full md:w-1/2 h-2/5 md:h-full bg-gradient-to-br from-slate-900 to-indigo-950 flex flex-col justify-center items-center p-8 relative">
        <div class="relative w-full max-w-sm text-center">
            <div class="carousel-item active">
                <img src="https://images.unsplash.com/photo-1542291026-7eec264c27ff?w=500" class="rounded-2xl shadow-2xl mx-auto h-40 md:h-48 object-cover mb-6">
                <h3 class="text-xl font-bold text-cyan-400">Trending Sneakers</h3>
                <p class="text-gray-400 text-xs mt-2">Vendors are clearing stocks with 40% automated leads.</p>
            </div>
            <div class="carousel-item">
                <img src="https://images.unsplash.com/photo-1523275335684-37898b6baf30?w=500" class="rounded-2xl shadow-2xl mx-auto h-40 md:h-48 object-cover mb-6">
                <h3 class="text-xl font-bold text-purple-400">Smart Gadgets</h3>
                <p class="text-gray-400 text-xs mt-2">Direct WhatsApp routing ensures instant conversions.</p>
            </div>
        </div>
    </div>

    <div class="w-full md:w-1/2 h-3/5 md:h-full bg-white flex items-center justify-center p-6 md:p-16 overflow-y-auto">
        <div class="w-full max-w-md">
            
            <div class="mb-6">
                <h2 class="text-2xl font-black text-slate-900 tracking-tight">Marketplace Hub</h2>
                <p class="text-slate-500 text-xs mt-1">Manage your customer or vendor account securely.</p>
            </div>

            <div class="flex border-b border-slate-100 mb-6">
                <button id="btn-login" onclick="toggleForm('login')" class="pb-3 text-sm font-bold border-b-2 border-slate-900 text-slate-900 mr-6">Sign In</button>
                <button id="btn-signup" onclick="toggleForm('signup')" class="pb-3 text-sm font-semibold border-b-2 border-transparent text-slate-400 hover:text-slate-600">Register</button>
            </div>

            <div class="space-y-4">
                <div>
                    <label class="block text-[10px] font-bold text-slate-700 uppercase tracking-wider mb-1">Email address</label>
                    <input id="inp-email" type="email" placeholder="name@domain.com" class="w-full bg-slate-50 border border-slate-200 rounded-xl px-4 py-3 text-sm text-slate-900 focus:outline-none focus:border-slate-900 transition">
                </div>

                <div>
                    <label class="block text-[10px] font-bold text-slate-700 uppercase tracking-wider mb-1">Password</label>
                    <input id="inp-password" type="password" placeholder="••••••••" class="w-full bg-slate-50 border border-slate-200 rounded-xl px-4 py-3 text-sm text-slate-900 focus:outline-none focus:border-slate-900 transition">
                </div>

                <div id="wrapper-signup" class="hidden space-y-4 pt-2">
                    <div>
                        <label class="block text-[10px] font-bold text-slate-700 uppercase tracking-wider mb-1">Account Tier</label>
                        <select id="inp-role" onchange="checkVendorField(this.value)" class="w-full bg-slate-50 border border-slate-200 rounded-xl px-4 py-3 text-sm text-slate-900 focus:outline-none">
                            <option value="customer">Customer Account</option>
                            <option value="vendor">Store Vendor</option>
                        </select>
                    </div>

                    <div>
                        <label class="block text-[10px] font-bold text-slate-700 uppercase tracking-wider mb-1">WhatsApp Number</label>
                        <input id="inp-whatsapp" type="text" placeholder="923001234567" class="w-full bg-slate-50 border border-slate-200 rounded-xl px-4 py-3 text-sm text-slate-900 focus:outline-none">
                    </div>

                    <div id="field-store" class="hidden">
                        <label class="block text-[10px] font-bold text-slate-700 uppercase tracking-wider mb-1">Store Name</label>
                        <input id="inp-store" type="text" placeholder="Brand Hub" class="w-full bg-slate-50 border border-slate-200 rounded-xl px-4 py-3 text-sm text-slate-900 focus:outline-none">
                    </div>
                </div>

                <div class="pt-2">
                    <button onclick="processAuth()" class="w-full bg-slate-950 text-white font-bold py-3.5 rounded-xl text-sm shadow-xl hover:bg-slate-800 transition">Continue</button>
                </div>
            </div>

        </div>
    </div>

    <script>
        // Aap ki actual active credentials
        const SUPABASE_URL = "https://g7wxp2l7eerm_eluzmbzxq.supabase.co"; 
        const SUPABASE_KEY = "sb_publishable_i5yn_DO5iH1eCzu3msjpfw_MQXKI4Je";
        
        const supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
        let viewMode = 'login';

        // Carousel Automation
        let currentSlide = 0;
        const slides = document.querySelectorAll('.carousel-item');
        setInterval(() => {
            slides[currentSlide].classList.remove('active');
            currentSlide = (currentSlide + 1) % slides.length;
            slides[currentSlide].classList.add('active');
        }, 4000);

        function toggleForm(mode) {
            viewMode = mode;
            const isLogin = mode === 'login';
            document.getElementById('btn-login').className = isLogin ? "pb-3 text-sm font-bold border-b-2 border-slate-900 text-slate-900 mr-6" : "pb-3 text-sm font-semibold border-b-2 border-transparent text-slate-400";
            document.getElementById('btn-signup').className = !isLogin ? "pb-3 text-sm font-bold border-b-2 border-slate-900 text-slate-900" : "pb-3 text-sm font-semibold border-b-2 border-transparent text-slate-400";
            document.getElementById('wrapper-signup').style.display = isLogin ? 'none' : 'block';
        }

        function checkVendorField(role) {
            document.getElementById('field-store').style.display = role === 'vendor' ? 'block' : 'none';
        }

        // Logic for Login and Signup
        async function processAuth() {
            const email = document.getElementById('inp-email').value;
            const password = document.getElementById('inp-password').value;

            if(!email || !password) return alert("Please fill all core fields.");

            if(viewMode === 'signup') {
                const role = document.getElementById('inp-role').value;
                const whatsapp = document.getElementById('inp-whatsapp').value;
                const storeName = document.getElementById('inp-store').value;

                if(!whatsapp) return alert("WhatsApp number is required!");

                // 1. Create User in Supabase Auth
                const { data, error } = await supabase.auth.signUp({ email, password });
                if(error) return alert("Error: " + error.message);

                if(data.user) {
                    // 2. Save Profile details into 'profiles' table
                    const { error: dbError } = await supabase
                        .from('profiles')
                        .insert([{ id: data.user.id, role, whatsapp, store_name: role === 'vendor' ? storeName : null }]);
                    
                    if(dbError) return alert("Database Error: " + dbError.message);
                    alert("Registration successful! Please check your email for confirmation link.");
                }
            } else {
                // Login Processing
                const { data, error } = await supabase.auth.signInWithPassword({ email, password });
                if(error) return alert("Login Failed: " + error.message);
                
                // Fetch user role from profiles table
                const { data: profile } = await supabase.from('profiles').select('role').eq('id', data.user.id).single();
                alert(`Welcome back! Logged in as: ${profile ? profile.role : 'User'}`);
            }
        }
    </script>
</body>
</html>
