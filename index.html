<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Premium Multi-Vendor Chat-to-Buy Portal</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: radial-gradient(circle at top right, #0d0e15, #07070a); color: #fff; min-height: 100vh; font-family: 'Inter', sans-serif; }
        .glass { background: rgba(255, 255, 255, 0.02); backdrop-filter: blur(16px); border: 1px solid rgba(255, 255, 255, 0.06); }
    </style>
</head>
<body class="p-4 md:p-8 flex items-center justify-center">

    <div class="glass w-full max-w-lg rounded-3xl p-8 shadow-2xl relative overflow-hidden">
        <div class="text-center mb-8">
            <h1 class="text-3xl font-black tracking-wider bg-gradient-to-r from-cyan-400 via-blue-500 to-indigo-500 bg-clip-text text-transparent">UP-MARKET</h1>
            <p class="text-gray-400 text-xs mt-2">Premium Chat-to-Buy Local Multi-Vendor Platform</p>
        </div>

        <div class="space-y-4">
            <div>
                <label class="block text-[10px] font-bold uppercase tracking-widest text-cyan-400 mb-1">Email Address</label>
                <input id="email" type="email" placeholder="name@example.com" class="w-full bg-white/5 border border-white/10 rounded-xl px-4 py-3 text-sm text-white focus:outline-none focus:border-cyan-500 transition">
            </div>

            <div>
                <label class="block text-[10px] font-bold uppercase tracking-widest text-cyan-400 mb-1">Secure Password</label>
                <input id="password" type="password" placeholder="••••••••" class="w-full bg-white/5 border border-white/10 rounded-xl px-4 py-3 text-sm text-white focus:outline-none focus:border-cyan-500 transition">
            </div>

            <div>
                <label class="block text-[10px] font-bold uppercase tracking-widest text-cyan-400 mb-1">WhatsApp Business Line</label>
                <input id="whatsapp" type="text" placeholder="e.g. 923001234567" class="w-full bg-white/5 border border-white/10 rounded-xl px-4 py-3 text-sm text-white focus:outline-none focus:border-cyan-500 transition">
            </div>

            <div>
                <label class="block text-[10px] font-bold uppercase tracking-widest text-cyan-400 mb-1">Marketplace Account Intent</label>
                <select id="role" onchange="handleRoleToggle(this.value)" class="w-full bg-slate-900 border border-white/10 rounded-xl px-4 py-3 text-sm text-white focus:outline-none focus:border-cyan-500">
                    <option value="customer">I want to Discover & Buy Products</option>
                    <option value="vendor">I want to Set Up a Store & Sell</option>
                </select>
            </div>

            <div id="vendor-extra" class="hidden space-y-3 pt-3 border-t border-white/5">
                <input id="store-name" type="text" placeholder="Your Digital Store Name" class="w-full bg-white/5 border border-white/10 rounded-xl px-4 py-3 text-sm text-white focus:outline-none focus:border-cyan-500 transition">
            </div>

            <div class="pt-2 flex flex-col gap-2">
                <button onclick="executeAuth('signup')" class="w-full bg-gradient-to-r from-cyan-500 to-blue-600 py-3.5 rounded-xl text-sm font-bold shadow-lg shadow-cyan-500/10 hover:from-cyan-400 transition">Establish Account</button>
                <button onclick="executeAuth('login')" class="w-full bg-white/5 hover:bg-white/10 py-3.5 rounded-xl text-sm font-semibold transition">Sign In Instead</button>
            </div>
        </div>
    </div>

    <script>
        // REPLACE THESE WITH YOUR MANUALLY COPIED CREDENTIALS ONCE LIVE
        const SUPABASE_URL = "YOUR_SUPABASE_URL_HERE";
        const SUPABASE_ANON_KEY = "YOUR_SUPABASE_ANON_KEY_HERE";
        
        let db = null;
        if(SUPABASE_URL !== "YOUR_SUPABASE_URL_HERE") {
            db = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
        }

        function handleRoleToggle(val) {
            document.getElementById('vendor-extra').style.display = (val === 'vendor') ? 'block' : 'none';
        }

        async function executeAuth(mode) {
            if(!db) {
                alert("Setup Alert: Please open index.html and update your actual Supabase keys to bring the application online!");
                return;
            }
            // Logic handling for full profile setup...
        }
    </script>
</body>
</html>
